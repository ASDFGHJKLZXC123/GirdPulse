services:
  redpanda:
    image: redpandadata/redpanda:v26.1.12
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --schema-registry-addr=internal://0.0.0.0:28081,external://0.0.0.0:8081
    ports: ['9092:9092', '8081:8081']
    healthcheck:
      test: ['CMD-SHELL', "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      retries: 20

  console:
    image: redpandadata/console:v3.8.0
    environment:
      KAFKA_BROKERS: redpanda:29092
      SCHEMAREGISTRY_ENABLED: 'true'
      SCHEMAREGISTRY_URLS: http://redpanda:28081
    ports: ['8080:8080']
    # no container healthcheck: the console image ships no shell utilities to probe with.
    # Liveness is verified from the host (curl -f localhost:8080) — see checklist.
    depends_on:
      redpanda: { condition: service_healthy }

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gridpulse
      POSTGRES_PASSWORD: gridpulse
      POSTGRES_DB: gridpulse
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gridpulse']
      interval: 5s
      retries: 20
